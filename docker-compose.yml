# =============================================================================
# ROS 2 Jazzy — Docker Compose Configuration (Cross-Platform)
# =============================================================================
# Compatible with: macOS (Apple Silicon + Intel), Linux, Windows (WSL2)
#
# Usage:
#   ./run.sh start    — build (if needed) and launch the container
#   ./run.sh shell    — open an interactive shell in the running container
#   ./run.sh stop     — stop and remove the container
#   ./run.sh build    — force-rebuild the image
#   ./run.sh status   — show container state
#   ./run.sh logs     — tail container logs
#   ./run.sh gui      — show GUI connection info
#
# GUI Strategy: Pure Mesa llvmpipe + VNC + noVNC (no VirtualGL, no XQuartz)
#   All GUI apps render on an Xvfb virtual framebuffer (:99) inside the
#   container using Mesa's llvmpipe software renderer (OpenGL 4.5).
#   The framebuffer is streamed over VNC (port 5900) and served via the
#   noVNC browser client (port 6080).
#
#   View the desktop: http://localhost:6080/vnc.html
#   VNC client:       vnc://localhost:5900  (no password)
#
# Inside the container use:  rv (rviz2)   rq (rqt)   gz (gazebo sim)
# =============================================================================

services:
  ros_dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-jazzy-dev:latest
    container_name: ros_jazzy_dev

    environment:
      # ------------------------------------------------------------------
      # Display — Xvfb virtual framebuffer (:99) inside the container.
      # ------------------------------------------------------------------
      - DISPLAY=:99

      # ------------------------------------------------------------------
      # Mesa llvmpipe software renderer — OpenGL 4.5, no GPU required.
      # LIBGL_ALWAYS_SOFTWARE=1 forces Mesa to handle all GL calls.
      # GALLIUM_DRIVER=llvmpipe selects the llvmpipe Gallium driver.
      # ------------------------------------------------------------------
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe

      # Tell OGRE/RViz2 the software renderer satisfies GL 3.3.
      - MESA_GL_VERSION_OVERRIDE=3.3
      - MESA_GLSL_VERSION_OVERRIDE=330

      # OGRE off-screen texture blit — avoids GLX pbuffer issues.
      - OGRE_RTT_MODE=Copy

      # Qt xcb backend — required when DISPLAY points to Xvfb.
      - QT_QPA_PLATFORM=xcb

      # Suppress Qt XDG_RUNTIME_DIR warnings.
      - XDG_RUNTIME_DIR=/tmp/runtime-ros

      # ------------------------------------------------------------------
      # ROS 2
      # ------------------------------------------------------------------
      - ROS_DOMAIN_ID=0
      - RCUTILS_COLORIZED_OUTPUT=1

    ports:
      - "5900:5900"   # VNC  — connect with any VNC client (no password)
      - "6080:6080"   # noVNC — http://localhost:6080/vnc.html

    volumes:
      # ROS 2 package source — persisted on the host
      - ./src:/ros2_ws/src
      # Named volumes keep colcon build artifacts between container restarts
      - ros2_build_cache:/ros2_ws/build
      - ros2_install_cache:/ros2_ws/install
      - ros2_log_cache:/ros2_ws/log

    stdin_open: true
    tty: true
    privileged: true
    shm_size: "512mb"
    restart: "no"

    # ------------------------------------------------------------------
    # DNS — explicit resolvers for fuel.gazebosim.org and other external
    # hosts (default Docker DNS can fail on macOS/Windows).
    # ------------------------------------------------------------------
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  ros2_build_cache:
  ros2_install_cache:
  ros2_log_cache: