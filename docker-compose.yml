# =============================================================================
# ROS 2 Jazzy — Docker Compose Configuration for macOS
# =============================================================================
# Usage:
#   ./run.sh start    — build (if needed) and launch the container
#   ./run.sh shell    — open an interactive shell inside the running container
#   ./run.sh stop     — stop and remove the container
#   ./run.sh build    — force-rebuild the image
#
# GUI Strategy: VNC + noVNC (no XQuartz required)
#   All GUI apps render on an Xvfb virtual framebuffer (:99) inside the
#   container, which is served over VNC (port 5900) and noVNC (port 6080).
#
#   View the desktop in your browser:  http://localhost:6080/vnc.html
#   Or via any VNC client:             vnc://localhost:5900  (no password)
#
# Inside the container use:  rv (rviz2)  rq (rqt)  gz (gazebo)
# =============================================================================

services:
  ros_dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-jazzy-macos:latest
    container_name: ros_jazzy_dev

    environment:
      # ------------------------------------------------------------------
      # Display — Xvfb virtual framebuffer inside the container.
      # GUI output is served to the host via VNC (port 5900) and
      # noVNC browser UI (port 6080).  No XQuartz needed.
      # ------------------------------------------------------------------
      - DISPLAY=:99

      # ------------------------------------------------------------------
      # VirtualGL + Mesa llvmpipe software rendering
      # ------------------------------------------------------------------
      # VGL_DISPLAY=:99 — OpenGL rendered by VirtualGL on Xvfb:99.
      # DISPLAY=:99 means both render target and output are the same
      # local display, so no network transport or vglclient is required.
      - VGL_DISPLAY=:99

      # Force Mesa's llvmpipe software renderer (OpenGL 4.5 capable)
      - GALLIUM_DRIVER=llvmpipe
      - LIBGL_ALWAYS_SOFTWARE=1

      # Tell OGRE/RViz2 the software renderer satisfies the GL 3.3 requirement.
      - MESA_GL_VERSION_OVERRIDE=3.3
      - MESA_GLSL_VERSION_OVERRIDE=330

      # OGRE_RTT_MODE=Copy — off-screen texture blit; avoids GLX pbuffer issues.
      - OGRE_RTT_MODE=Copy
      # QT_QPA_PLATFORM=xcb — tells Qt to use the X11/xcb backend.
      # Without this Qt aborts with "could not load platform plugin xcb" when
      # DISPLAY=:99 because it cannot auto-detect the platform in some builds.
      - QT_QPA_PLATFORM=xcb

      # ------------------------------------------------------------------
      # ROS 2
      # ------------------------------------------------------------------
      - ROS_DOMAIN_ID=0
      - RCUTILS_COLORIZED_OUTPUT=1

    ports:
      - "5900:5900"   # VNC  — connect with any VNC client (no password)
      - "6080:6080"   # noVNC — open http://localhost:6080/vnc.html in a browser

    volumes:
      # Your ROS 2 package source — persisted on the host Mac
      - ./src:/ros2_ws/src
      # Named volumes keep colcon build artefacts between container restarts
      - ros2_build_cache:/ros2_ws/build
      - ros2_install_cache:/ros2_ws/install
      - ros2_log_cache:/ros2_ws/log

    stdin_open: true
    tty: true
    privileged: true
    shm_size: "512mb"
    restart: "no"

    # ------------------------------------------------------------------
    # DNS — explicit resolvers so container can reach fuel.gazebosim.org
    # and other external hosts (default Docker DNS sometimes fails on macOS)
    # ------------------------------------------------------------------
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  ros2_build_cache:
  ros2_install_cache:
  ros2_log_cache: